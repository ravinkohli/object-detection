# Fast R-CNN config (two-stage with EXTERNAL Selective Search proposals).
# Same ROI head as Faster R-CNN, but no RPN — proposals come from a precomputed
# Selective Search cache (run scripts/precompute_proposals.py first).

model:
  name: fast_rcnn
  backbone: vgg16
  pretrained_backbone: false
  num_classes: 5

  roi_head:
    output_size: 7
    fg_iou_thresh: 0.5
    bg_iou_thresh: 0.5     # (Fast R-CNN uses [0.1, 0.5) for bg; tune if you like)
    batch_size: 128
    positive_fraction: 0.25
    box_reg_weights: [10.0, 10.0, 5.0, 5.0]

proposals:                 # Selective Search settings (data/proposals.py)
  cache_dir: data/coco/proposals_ss
  fast: true               # fast vs quality mode
  max_proposals: 2000

data:
  root: data/coco
  images_dir: data/coco/val2017
  ann_file: data/coco/annotations/instances_val2017.json
  classes: [person, car, dog, cat, chair]
  max_images: 800
  val_fraction: 0.2
  image_min_size: 600
  image_max_size: 1000
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  hflip_prob: 0.5
  num_workers: 4

optim:
  epochs: 20
  batch_size: 2
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_steps: [12, 16]
  lr_gamma: 0.1
  grad_clip: 10.0

eval:
  score_thresh: 0.05
  nms_thresh: 0.5
  max_detections: 100
  eval_every: 2

mlflow:
  experiment: fast_rcnn
  run_name: fast_rcnn-subset
  tracking_uri: null

device: mps
seed: 0
output_dir: runs/fast_rcnn
