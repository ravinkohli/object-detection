# RT-DETR config (efficient hybrid encoder: AIFI + CCFM, IoU-aware query selection).
# Reuse DINO's deformable decoder; the new pieces are the encoder + query selection.

model:
  name: rtdetr
  backbone: resnet50        # RT-DETR uses ResNet/HGNet; resnet50 is fine for learning
  pretrained_backbone: true
  num_classes: 5
  num_queries: 300
  d_model: 256
  nhead: 8
  num_decoder_layers: 6
  dim_feedforward: 1024     # AIFI uses a lighter FFN
  dropout: 0.0
  feat_levels: [layer2, layer3, layer4]   # C3, C4, C5
  dec_n_points: 4

  hybrid_encoder:
    aifi_on_level: 2        # apply AIFI to the top level (S5) only
    ccfm_hidden: 256

query_selection:
  iou_aware: true           # supervise the selection score to correlate with IoU
  num_select: 300

denoising:                  # RT-DETR also benefits from CDN (optional)
  enabled: true
  num_dn_queries: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

loss:
  cost_class: 2.0
  cost_bbox: 5.0
  cost_giou: 2.0
  weight_ce: 1.0
  weight_bbox: 5.0
  weight_giou: 2.0
  use_focal: true
  aux_loss: true

data:
  root: data/coco
  images_dir: data/coco/val2017
  ann_file: data/coco/annotations/instances_val2017.json
  classes: [person, car, dog, cat, chair]
  max_images: 800
  val_fraction: 0.2
  image_size: 640           # RT-DETR uses a fixed 640x640 square
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  hflip_prob: 0.5
  num_workers: 4

optim:
  epochs: 60
  batch_size: 2
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  lr_steps: [50]
  lr_gamma: 0.1
  grad_clip: 0.1

eval:
  score_thresh: 0.5
  max_detections: 300
  eval_every: 5

mlflow:
  experiment: rtdetr
  run_name: rtdetr-subset
  tracking_uri: null

device: mps
seed: 0
output_dir: runs/rtdetr
