# DINO config (Deformable-DETR core + mixed query selection + contrastive denoising).
# Build incrementally: get Deformable DETR working first, then query selection, then CDN.

model:
  name: dino
  backbone: resnet50
  pretrained_backbone: true
  num_classes: 5
  num_queries: 300
  d_model: 256
  nhead: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.0
  num_feature_levels: 4     # multi-scale (C3,C4,C5 + 1 extra) for deformable attn
  dec_n_points: 4           # deformable sampling points / level
  enc_n_points: 4

denoising:                  # contrastive denoising (CDN), train-only
  enabled: true
  num_dn_queries: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

loss:
  cost_class: 2.0           # DINO uses focal-style class cost
  cost_bbox: 5.0
  cost_giou: 2.0
  weight_ce: 1.0
  weight_bbox: 5.0
  weight_giou: 2.0
  use_focal: true
  aux_loss: true

data:
  root: data/coco
  images_dir: data/coco/val2017
  ann_file: data/coco/annotations/instances_val2017.json
  classes: [person, car, dog, cat, chair]
  max_images: 800
  val_fraction: 0.2
  image_min_size: 480
  image_max_size: 800
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  hflip_prob: 0.5
  num_workers: 4

optim:
  epochs: 50               # DINO converges much faster than DETR
  batch_size: 2            # deformable attn + multi-scale is memory-hungry on MPS
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  lr_steps: [40]
  lr_gamma: 0.1
  grad_clip: 0.1

eval:
  score_thresh: 0.5
  max_detections: 300
  eval_every: 5

mlflow:
  experiment: dino
  run_name: dino-subset
  tracking_uri: null

device: mps
seed: 0
output_dir: runs/dino
