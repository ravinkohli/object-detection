# Faster R-CNN config (two-stage: backbone + RPN + ROI head).
# These configs are the single source of truth for an experiment. Your code
# (utils/config.py + the model/data builders) decides which keys it reads — treat
# the keys below as the suggested schema, adjust freely as you implement.

model:
  name: faster_rcnn
  # Single-level (classic) uses vgg16. FPN needs a multi-level backbone -> resnet50.
  backbone: vgg16          # vgg16 (single-level) | resnet50 (use with fpn.enabled)
  pretrained_backbone: false   # true = ImageNet init (much faster convergence)
  num_classes: 5           # contiguous classes (must match data.classes length)

  # --- Feature Pyramid Network (optional neck; see models/fpn.py) ---
  # enabled: false -> classic single-level Faster R-CNN (vgg16 conv5, stride 16).
  # enabled: true  -> resnet50 C2..C5 -> FPN P2..P6; the RPN/anchors go multi-level
  #                   and the ROI head uses MultiScaleRoIAlign.
  fpn:
    enabled: false
    backbone: resnet50           # which backbone to draw C2..C5 from when enabled
    return_layers: [layer1, layer2, layer3, layer4]   # -> C2, C3, C4, C5
    out_channels: 256            # unified pyramid channel count
    add_p6: true                 # extra coarsest level for the RPN (large objects)
    strides: [4, 8, 16, 32, 64]  # P2..P6 input strides (must match the levels used)

  rpn:
    # SINGLE-LEVEL (fpn.enabled: false): 3 scales on one map at one stride.
    anchor_scales: [128, 256, 512]
    feature_stride: 16     # VGG16 conv5 stride
    # MULTI-LEVEL (fpn.enabled: true): ONE scale per pyramid level, shared ratios.
    # Used instead of anchor_scales/feature_stride above when fpn.enabled.
    anchor_scales_per_level: [[32], [64], [128], [256], [512]]   # P2..P6
    anchor_ratios: [0.5, 1.0, 2.0]   # shared across levels
    pre_nms_top_n: 2000
    post_nms_top_n: 1000
    nms_thresh: 0.7
    fg_iou_thresh: 0.7     # >= -> positive anchor
    bg_iou_thresh: 0.3     # <  -> negative anchor
    batch_size: 256        # sampled anchors / image
    positive_fraction: 0.5

  roi_head:
    output_size: 7         # ROI-align output HxW
    # With FPN: MultiScaleRoIAlign routes each proposal to a level by its size.
    # canonical_scale/level are the k0/224 params of FPN eq.1 (k = k0 + log2(sqrt(wh)/224)).
    canonical_scale: 224
    canonical_level: 4
    fg_iou_thresh: 0.5
    bg_iou_thresh: 0.5
    batch_size: 128        # sampled proposals / image
    positive_fraction: 0.25
    box_reg_weights: [10.0, 10.0, 5.0, 5.0]

data:
  root: data/coco                       # where download_coco.py puts things
  images_dir: data/coco/val2017         # default subset is carved from val2017
  ann_file: data/coco/annotations/instances_val2017.json
  classes: [person, car, dog, cat, chair]   # the 5 subset classes
  max_images: 800
  val_fraction: 0.2
  image_min_size: 600    # resize shorter side, keep aspect ratio
  image_max_size: 1000
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  hflip_prob: 0.5
  num_workers: 4

optim:
  epochs: 20
  batch_size: 2          # images/step (Faster R-CNN keeps a list, small batch)
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_steps: [12, 16]     # epochs at which to drop LR
  lr_gamma: 0.1
  grad_clip: 10.0

eval:
  score_thresh: 0.05
  nms_thresh: 0.5
  max_detections: 100
  eval_every: 2          # epochs

mlflow:
  experiment: faster_rcnn
  run_name: faster_rcnn-subset
  tracking_uri: null     # null -> local ./mlruns

device: mps
seed: 0
output_dir: runs/faster_rcnn
